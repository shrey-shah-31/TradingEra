services:
  # Backend Node.js Service
  - type: web
    name: tradingera-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: MONGOD_URL
        sync: false          # 👈 enter manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # 👈 auto‑generated secret
      - key: FRONTEND_URL
        value: https://tradingera.onrender.com

  # Frontend Static Site
  - type: static            # ✅ changed from static_site
    name: tradingera-frontend
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /(.*)       # ✅ indented as properties of the route
        destination: /index.html
