services:
- type: web
  name: tradingera-backend
    env: node
      plan: free
        buildCommand: cd backend && npm install
          startCommand: cd backend && npm start
            envVars:
              - key: NODE_VERSION
                  value: "20"
                    - key: PORT
                        value: "5000"
                          - key: MONGO_URI
                              sync: false
                                - key: JWT_SECRET
                                    generateValue: true
                                      - key: FRONTEND_URL
                                          value: https://tradingera.onrender.com

                                          - type: web
                                            runtime: static
                                              name: tradingera-frontend
                                                plan: free
                                                  buildCommand: cd frontend && npm install && npm run build
                                                    publishPath: frontend/dist
                                                      routes:
                                                        - type: rewrite
                                                            source: /(.*)
                                                                destination: /index.html
